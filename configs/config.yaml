experiment_tracking:
  columns:
  - experiment_id
  - date
  - model
  - stage
  - hypothesis
  - change_made
  - metric_before
  - metric_after
  - verdict
  - notes
  log_file: outputs/experiment_log.csv
paths:
  data:
    processed_essay: data/processed/essay/
    processed_pii: data/processed/pii/
    raw_essay: data/raw/essay/
    raw_pii: data/raw/pii/
    redacted_essays: data/redacted/
  outputs:
    experiment_log: outputs/experiment_log.csv
    models_essay: outputs/models/essay/
    models_pii: outputs/models/pii/
    plots_essay: outputs/plots/essay/
    plots_pii: outputs/plots/pii/
    plots_shap: outputs/plots/shap/
pipeline:
  distribution_shift_strategy: inference_only
  pii_confidence_threshold: 0.5
  redaction_token: '[REDACTED]'
seed: 42
shap:
  batch_size: 16
  max_evals: 500
  method: partition
  n_essays_summary: 50
  output_plots:
    html: outputs/plots/shap/shap_essay_highlight.html
    summary: outputs/plots/shap/shap_summary.png
    waterfall: outputs/plots/shap/shap_waterfall_sample.png
stage1:
  batch_size: 8
  class_weight_cap: 50.0
  dropout: 0.1
  entity_floors:
    B-ID_NUM: 0.55
    B-NAME_STUDENT: 0.55
    B-URL_PERSONAL: 0.8
    B-USERNAME: 0.9
    I-ID_NUM: 0.55
    I-NAME_STUDENT: 0.55
    I-URL_PERSONAL: 0.8
    I-USERNAME: 0.9
  external_records_path: data/raw/pii/external_records.json
  inference_threshold: 0.5
  learning_rate: 2.0e-05
  max_external_records: 5000
  max_grad_norm: 1.0
  max_length: 512
  model_name: microsoft/deberta-v3-base
  model_save_dir: outputs/models/pii
  num_epochs: 5
  num_labels: 13
  random_state: 42
  train_path: data/raw/pii/train.json
  val_fraction: 0.2
  warmup_fraction: 0.1
stage2:
  batch_size: 8
  dropout: 0.1
  epochs: 3
  lr: 2.0e-05
  max_length: 512
  model_name: microsoft/deberta-v3-base
  n_folds: 5
  output_dir: outputs/models/essay
  seed: 42
  test_path: data/raw/essay/test.csv
  train_path: data/raw/essay/train.csv
  warmup_ratio: 0.1
  weight_decay: 0.01
stage2_essay:
  data:
    fold_strategy: stratified
    n_folds: 5
    seed: 42
  handcrafted_features:
    enabled: false
    features:
    - flesch_kincaid_grade
    - type_token_ratio
    - avg_sentence_length
    - discourse_marker_count
    - avg_word_length
  loss:
    type: mse
  model:
    dropout: 0.1
    head_type: regression
    max_length: 512
    num_labels: 1
    pooling_strategy: mean
    pretrained_model: microsoft/deberta-v3-base
  output_dir: outputs/models/essay
  paths: null
  score_range:
    max: 6
    min: 1
  test_path: data/raw/essay/test.csv
  train_path: data/raw/essay/train.csv
  training:
    batch_size: 8
    epochs: 3
    eval_strategy: epoch
    fp16: true
    gradient_accumulation_steps: 4
    greater_is_better: true
    learning_rate: 2.0e-05
    load_best_model_at_end: true
    metric_for_best_model: qwk
    save_strategy: epoch
    warmup_ratio: 0.1
    weight_decay: 0.01
